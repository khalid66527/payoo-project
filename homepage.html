<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon" />
    <title>Payoo | Login</title>
    <!-- tailwoin daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- fosnts awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
      <section class="w-11/12 mx-auto py-3 flex justify-between">
        <div class="left flex gap-2">
          <div class="logo w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div class="balance-info">
            <h2 class="text-2xl font-bold">$ <span id="balance">4500</span></h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a href="index.html" class="btn btn-soft">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a
          >
        </div>
    </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-3">
      <h1 class="font-bold text-[24px]">
        Welcome to Pay<span class="text-primary">oo</span>
      </h1>
      <p class="text-neutral/50 pb-4">Enjoy easy and convenient financial services with us. <br> Cashout charge is low and </p>

      <div class="buttons grid grid-cols-3 gap-2">
        <button onclick="showOnly('Add-Money')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-1.png" alt="">
            <p>Add Money</p>
        </button>
        <button onclick="showOnly('Cashout')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-2.png" alt="">
            <p>Cashout</p>
        </button>
        <button onclick="showOnly('Transfer')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-3.png" alt="">
            <p>Transfer Money</p>
        </button>
        <button onclick="showOnly('')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-4.png" alt="">
            <p>Get Bonus</p>
        </button>
        <button onclick="showOnly('pay-bill')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-5.png" alt="">
            <p>Pay Bill</p>
        </button>
        <button  onclick="showOnly('history')"  onclick="showOnly('')" class="btn flex-col h-full py-3 btn-soft">
            <img src="./assets/opt-6.png" alt="">
            <p>Transactions</p>
        </button>
     
      </div>
    </section>

      <!-- Teansfer Money section -->
    <section  id="Transfer" class=" w-11/12 mx-auto py-5 ">
      <h2 class="text-xl font-bold">Transfer Money</h2>

      <div class="form pt-10">
          <div class="card bg-base-100 w-full  shadow rounded-2xl">
            
              <fieldset class="fieldset">
                <label   class="label text-neutral font-bold">User Account Number</label>
                <input id="transfer-number" minlength="11" maxlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01234567890" placeholder="Enter 11 digit number" /> 

                <br>

                <label   class="label text-neutral font-bold">Amount</label>
                <input id="transfer-amount"type="number" class="input rounded-full bg-base-200 w-full"placeholder="Enter amount to transfer" /> 

                <br>

                <label class="label text-neutral font-bold">Pin Number</label>
                <input id="transfer-pin" minlength="4" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                <button id="transfer-btn" class="btn btn-primary mt-5 rounded-full">Send Now</button>
              </fieldset>
            
          </div>
      </div>
    </section>

    <!-- pay Bill section -->

    <section id="pay-bill" class=" w-11/12 mx-auto py-5 ">
      <h2 class="text-xl font-bold">Pay Bill</h2>
      <div class="card bg-base-100 w-full  shadow rounded-2xl">
              <fieldset class="fieldset">
                <label   class="label text-neutral font-bold">Select To Pay</label>
                <select id="pay-bank" class="select rounded-full bg-base-200 w-full">
                  <option disabled selected>Select back </option>
                  <option value="PDB">PDB</option>
                  <option value="ODD">ODD</option>
                  <option value="PB">PB</option>
                </select>
                <br>
                <label   class="label text-neutral font-bold">Biller Account Number</label>
                <input id="pay-account-number" minlength="12" maxlength="12" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter 12 digit account number" /> 

                <br>

                <label   class="label text-neutral font-bold">Amount to Pay</label>
                <input id="pay-bill-amount"type="number" class="input rounded-full bg-base-200 w-full"  placeholder="Add Amount to Pay" /> 

                <br>

                <label class="label text-neutral font-bold">Pin Number</label>
                <input id="pay-bill-pin" minlength="4" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                <button id="pay-bill-btn" class="btn btn-primary mt-5 rounded-full">Pay Now</button>
              </fieldset>
            
      </div>

    </section>
    <!-- add money section -->
     
    <section id="Add-Money" class=" w-11/12 mx-auto py-5 ">
      <h2 class="text-xl font-bold">Add Money</h2>
      <div class="card bg-base-100 w-full  shadow rounded-2xl">
              <fieldset class="fieldset">
                <label   class="label text-neutral font-bold">Select A Bank</label>
                <select id="add-money-bank" class="select rounded-full bg-base-200 w-full">
                  <option disabled selected>Select a bank </option>
                  <option value="DBBL">DBBL</option>
                  <option value="IBBL">IBBL</option>
                  <option value="CITY">CITY Bank</option>
                </select>
                <br>
                <label   class="label text-neutral font-bold">Bank Account Number</label>
                <input id="add-money-number" minlength="11" maxlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01234567890" placeholder="Enter 11 digit account number" /> 

                <br>

                <label   class="label text-neutral font-bold">Amount to Add</label>
                <input id="add-money-amount"type="number" class="input rounded-full bg-base-200 w-full"  placeholder="Enter amount to withdraw" /> 

                <br>

                <label class="label text-neutral font-bold">Pin Number</label>
                <input id="add-money-pin" minlength="4" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                <button id="add-money-btn" class="btn btn-primary mt-5 rounded-full">Add Money</button>
              </fieldset>
            
      </div>

    </section>

    <!-- cashout section  -->


    <section id="Cashout" class=" w-11/12 mx-auto py-5 ">
      <h2 class="text-xl font-bold">Cashout</h2>

      <div class="form pt-10">
          <div class="card bg-base-100 w-full  shadow rounded-2xl">
            
              <fieldset class="fieldset">
                <label   class="label text-neutral font-bold">Agent Number</label>
                <input id="cashout-number" minlength="11" maxlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01234567890" placeholder="Enter Agent 11 digit number" /> 

                <br>

                <label   class="label text-neutral font-bold">Amount</label>
                <input id="cashout-amount"type="number" class="input rounded-full bg-base-200 w-full"  placeholder="Enter amount to withdraw" /> 

                <br>

                <label class="label text-neutral font-bold">Pin Number</label>
                <input id="cashout-pin" minlength="4" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 digit pin number" />
                <button id="cashout-btn" class="btn btn-primary mt-5 rounded-full">withdraw Money</button>
              </fieldset>
            
          </div>
      </div>
    </section>

    <!-- history section -->
     <section id="history" class="w-11/12 mx-auto py-5">
      <h2 class="text-xl font-bold mb-5">Transacrions</h2>
      <div class=" space-y-5" id="history-container">
        <div class="transaction-card p-5 bg-base-100">

        </div>
      </div>
     </section>


    <script src="./script/machine.js"></script>
    <script src="./script/transfer.js"></script>
    <script src="./script/pay-bill.js"></script>
    <script src="./script/add-money.js"></script>
    <script src="./script/cashout.js"></script>
  </body>
</html>
